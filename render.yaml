services:
  - type: web
    name: newspaper-ai
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health

databases:
  - name: newspaper-ai-db
    plan: starter
